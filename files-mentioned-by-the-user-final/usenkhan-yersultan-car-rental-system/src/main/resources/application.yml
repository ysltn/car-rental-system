server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carrental}
    username: ${DB_USERNAME:carrental}
    password: ${DB_PASSWORD:carrental}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  student:
    fullName: "Usenkhan Yersultan"
    group: "IT2-2310"
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-123}
    expirationMinutes: 60
  storage:
    dir: ${STORAGE_DIR:./storage}

logging:
  level:
    root: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO

